<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTANIKA | Shop</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/chatbot.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="shop-page">
    <div class="texture-overlay"></div>
    
    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2C13.5 4.5 17 7 17 11C17 15 14.5 18 12 22M12 2C10.5 4.5 7 7 7 11C7 15 9.5 18 12 22M12 2V22M5 9C7.5 9.5 10 11 12 14M19 9C16.5 9.5 14 11 12 14"/>
            </svg>
            <span class="logo-text">BOTANIKA</span>
        </a>
        
        <div class="nav-center">
            <a href="shop.html" class="nav-link active">Shop</a>
        </div>
        
        <div class="nav-right">
            <!-- User Badge - clickable to dashboard -->
            <a href="#" class="user-badge" id="userBadge" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C13.5 4.5 17 7 17 11C17 15 14.5 18 12 22M12 2C10.5 4.5 7 7 7 11C7 15 9.5 18 12 22"/>
                </svg>
                <span id="userName"></span>
            </a>
            
            <!-- Auth Link -->
            <a href="auth.html" class="nav-link auth-link" id="authLink">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Sign In</span>
            </a>
            
            <!-- Logout Button -->
            <button class="nav-link logout-btn" id="logoutBtn" style="display: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Logout</span>
            </button>
            
            <!-- Cart Icon -->
            <button class="cart-btn" id="cartBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 6h15l-1.5 9h-12z"/>
                    <circle cx="9" cy="20" r="1"/>
                    <circle cx="18" cy="20" r="1"/>
                    <path d="M6 6L5 3H2"/>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="shop-main">
        <!-- Shop Header -->
        <header class="shop-header">
            <h1>Our Collection</h1>
            <p>Carefully curated botanical prints and living plants</p>
        </header>

        <!-- Product Grid -->
        <section class="product-grid" id="productGrid">
            <!-- Products will be dynamically inserted here -->
        </section>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg width="80" height="80" viewBox="0 0 100 100" fill="none" stroke="#8A9A5B" stroke-width="1.5">
                <ellipse cx="50" cy="85" rx="25" ry="8"/>
                <path d="M35 85V70c0-8 6-15 15-15s15 7 15 15v15"/>
                <path d="M50 55V35M40 45l10-10 10 10" stroke-dasharray="3,3"/>
            </svg>
            <h3>No products yet</h3>
            <p>Check back soon for our botanical collection</p>
        </div>
    </main>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="cart-close" id="cartClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be dynamically inserted here -->
        </div>

        <!-- Cart Empty State -->
        <div class="cart-empty" id="cartEmpty">
            <svg width="60" height="60" viewBox="0 0 100 100" fill="none" stroke="#8A9A5B" stroke-width="1.5">
                <ellipse cx="50" cy="75" rx="20" ry="6"/>
                <path d="M35 75V60c0-8 6-15 15-15s15 7 15 15v15"/>
                <circle cx="50" cy="35" r="3" fill="#8A9A5B" opacity="0.3"/>
                <circle cx="42" cy="42" r="2" fill="#8A9A5B" opacity="0.2"/>
                <circle cx="58" cy="40" r="2" fill="#8A9A5B" opacity="0.2"/>
            </svg>
            <p>Your cart is waiting for seeds…</p>
        </div>
        
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn btn-primary btn-full checkout-btn">
                <span>Proceed to Checkout</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </aside>

    <!-- Flying Product Animation Container -->
    <div class="flying-product" id="flyingProduct"></div>

    <!-- Product Detail Modal -->
    <div class="product-modal-overlay" id="productModalOverlay"></div>
    <div class="product-modal" id="productModal">
        <button class="modal-close" id="modalClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
        
        <div class="modal-content">
            <div class="modal-left">
                <div class="modal-image">
                    <img id="modalProductImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23E6DFD3' width='100' height='100'/%3E%3C/svg%3E" alt="Product Image">
                    <div class="modal-badges" id="modalBadges"></div>
                </div>
            </div>
            
            <div class="modal-right">
                <div class="modal-header">
                    <span class="modal-category" id="modalCategory"></span>
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-rating" id="modalRating">
                        <div class="stars"></div>
                        <span class="rating-count"></span>
                    </div>
                </div>
                
                <p class="modal-description" id="modalDescription"></p>
                
                <div class="modal-stats" id="modalStats">
                    <div class="stat-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        <span id="modalSoldCount">0 sold</span>
                    </div>
                    <div class="stat-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span id="modalViews">0 views</span>
                    </div>
                </div>
                
                <div class="modal-price-section">
                    <span class="modal-price" id="modalPrice"></span>
                    <span class="modal-stock" id="modalStock"></span>
                </div>
                
                <div class="modal-quantity">
                    <span class="quantity-label">Quantity:</span>
                    <div class="quantity-selector">
                        <button class="qty-btn" id="qtyDecrease">−</button>
                        <input type="number" id="qtyInput" value="1" min="1">
                        <button class="qty-btn" id="qtyIncrease">+</button>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button class="btn btn-secondary modal-cart-btn" id="modalAddToCart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 6h15l-1.5 9h-12z"/>
                            <circle cx="9" cy="20" r="1"/>
                            <circle cx="18" cy="20" r="1"/>
                        </svg>
                        <span>Add to Cart</span>
                    </button>
                    <button class="btn btn-primary modal-buy-btn" id="modalBuyNow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                        <span>Buy Now</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="related-products" id="relatedProducts">
            <h3>You May Also Like</h3>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div class="footer-placeholder"></div>

    <!-- Page transition overlay -->
    <div class="page-transition"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
